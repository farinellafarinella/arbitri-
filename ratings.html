<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Valuta arbitri</title>
    <link rel="apple-touch-icon" href="icon.png" />
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="top">
        <div>
          <h1 id="ratingsTitle">Valuta arbitri</h1>
          <p>Ogni dispositivo può votare una sola volta.</p>
        </div>
        <div id="connectionStatus" class="status ok">Locale</div>

      <section class="grid">
        <div class="panel">
          <div class="card">
            <h2>Lista arbitri</h2>
            <div id="ratingsList" class="list"></div>

          </div>
        </div>
      </section>
    </div>

    <script src="firebase-config.js?v=20260302"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>

    <script src="state.js?v=20260302"></script>
    <script src="status.js?v=20260302"></script>
    <script src="ratings.js?v=20260302"></script>
