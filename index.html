<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tornei (Offline)</title>
    <link rel="apple-touch-icon" href="icon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="top">
        <div>
          <h1>Tornei</h1>
          <p>Crea e gestisci più tornei. Funziona offline.</p>
        </div>
        <div id="connectionStatus" class="status ok">Locale</div>
      </header>

      <section class="grid">
        <div class="panel">
          <div class="card">
            <h2>Crea torneo</h2>
            <div class="row">
              <input id="tournamentName" placeholder="Nome torneo" />
              <input id="tournamentLink" placeholder="Link Challonge (opzionale)" />
              <button id="addTournamentBtn">Crea</button>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="card">
            <h2>Tornei attivi</h2>
            <div id="tournamentList" class="list"></div>
          </div>
        </div>
      </section>
    </div>

    <script src="firebase-config.js?v=20260302"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="state.js?v=20260302"></script>
    <script src="status.js?v=20260302"></script>
    <script src="tournaments.js?v=20260302"></script>
  </body>
</html>
