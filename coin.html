<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Arbitri & Arene" />
    <title>Sorteggio</title>
    <link rel="apple-touch-icon" href="icon.png" />
    <link rel="manifest" href="manifest.json?v=20260319h" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="top">
        <div>
          <h1 id="coinTitle">Sorteggio</h1>
          <p id="coinStatus">Stato: —</p>
        </div>
        <div class="row" style="gap:8px;">
          <a class="arena-link" id="backToArena" href="arena.html">← Arena</a>
          <div id="connectionStatus" class="status ok">Locale</div>
        </div>
      </header>

      <section class="grid">
        <div class="panel">
          <div class="card">
            <h2>Testa o croce</h2>
            <div id="coinToss" class="coin-toss">
              <div id="coinLeft" class="coin-side">—</div>
              <div id="coinRight" class="coin-side">—</div>
            </div>
            <div class="row">
              <button id="tossBtn" disabled>Lancia moneta</button>
            </div>
            <div class="muted">Esito sorteggio: <span id="coinResult">—</span></div>
            <div id="tossMessage" class="muted"></div>
          </div>
        </div>
      </section>
    </div>

    <script src="firebase-config.js?v=20260319h"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="state.js?v=20260319h"></script>
    <script src="status.js?v=20260319h"></script>
    <script src="coin.js?v=20260319h"></script>
    <script src="register-sw.js?v=20260319h"></script>
  </body>
